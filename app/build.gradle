plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.nativeapk'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.nativeapk'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
