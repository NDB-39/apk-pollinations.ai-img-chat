<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HTML APK</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.5; }
    .box { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    button, input { font-size: 16px; padding: 10px; }
  </style>
</head>
<body>
  <h1>HTML APK chạy ổn</h1>
  <div class="box">
    <p>Thay toàn bộ thư mục <code>app/src/main/assets/web/</code> bằng mã nguồn web/game của anh.</p>
    <p>File chính phải là <code>index.html</code>.</p>
    <input type="file" id="fileInput" />
    <p id="result"></p>
  </div>
  <script>
    document.getElementById('fileInput').addEventListener('change', function () {
      const file = this.files && this.files[0];
      document.getElementById('result').textContent = file ? 'Đã chọn: ' + file.name : 'Chưa chọn file';
    });
  </script>
</body>
</html>
